<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Upload Materials — CourseLink</title>
    <link rel="icon" href="Images/web-icon.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/home.css" rel="stylesheet">
    <link href="css/dashboard.css" rel="stylesheet">
    <link href="css/materials.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg app-navbar sticky-top bg-white">
        <div class="container-fluid px-4">
            <a class="navbar-brand d-flex align-items-center" href="Home.html">
                <img src="Images/web-logo.png" alt="CourseLink" width="38" height="34" class="me-2">
                <span class="fw-bold">CourseLink</span>
            </a>
            <div class="ms-auto d-flex align-items-center">
                <span class="me-3 text-muted d-none d-md-block">Welcome, Dr. Smith</span>
                <a href="Profile.html" class="user-avatar text-decoration-none">DS</a>
            </div>
        </div>
    </nav>

    <div class="app-container">
        <aside class="app-sidebar">
            <nav class="nav flex-column">
                <a class="nav-link" href="Home.html">Home</a>
                <a class="nav-link" href="InstructorDashboard.html">Dashboard</a>
                <a class="nav-link" href="InstructorCourses.html">Manage Courses</a>
                <a class="nav-link" href="InstructorSyllabus.html">Edit Syllabus</a>
                <a class="nav-link active" href="InstructorMaterials.html">Upload Materials</a>
                <a class="nav-link" href="InstructorCalendar.html">Exam Calendar</a>
            </nav>
        </aside>

        <main class="app-main">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="page-title mb-0">Course Materials Management</h2>
                <button class="btn btn-primary rounded-pill px-4" data-bs-toggle="modal" data-bs-target="#uploadMaterialModal">+ Upload New File</button>
            </div>

            <div class="feature-card p-4 mb-5">
                <h5 class="fw-bold mb-3">Select Course to Manage</h5>
                <div class="row g-3">
                    <div class="col-md-4">
                        <select class="form-select" id="courseSelect">
                            <option value="CMP120">Intro to Programming (CMP120)</option>
                            <option value="MTH104">Calculus II (MTH104)</option>
                        </select>
                    </div>
                </div>
            </div>

            <h4 class="fw-bold mb-4">Current Materials</h4>
            <div class="row g-4" id="materials-grid">
                <!-- Populated by JS -->
            </div>
        </main>
    </div>

    <!-- Modal for Upload -->
    <div class="modal fade" id="uploadMaterialModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg">
                <div class="modal-header border-0 pb-0">
                    <h5 class="fw-bold">Upload Material</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="instructorUploadForm">
                        <div class="mb-3">
                            <label class="form-label small fw-bold">Title</label>
                            <input type="text" class="form-control" id="materialTitle" placeholder="e.g. Week 4 Notes" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold">Type</label>
                            <select class="form-select" id="materialType">
                                <option>Lecture Notes</option>
                                <option>Past Paper</option>
                                <option>Quiz</option>
                                <option>Other</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold">File</label>
                            <input type="file" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 mt-2 py-2">Upload Now</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const materials = [
            { title: "Chapter 1: Basics", type: "Lecture Notes", date: "2026-09-01", course: "CMP120" },
            { title: "Chapter 2: Variables", type: "Lecture Notes", date: "2026-09-08", course: "CMP120" },
            { title: "Midterm Review Sheet", type: "Past Paper", date: "2026-09-20", course: "MTH104" }
        ];

        function renderMaterials() {
            const grid = document.getElementById('materials-grid');
            const selectedCourse = document.getElementById('courseSelect').value;
            grid.innerHTML = '';
            
            materials.filter(m => m.course === selectedCourse).forEach(m => {
                grid.innerHTML += `
                    <div class="col-md-6 col-lg-4">
                        <div class="feature-card p-3 d-flex align-items-center">
                            <div class="feature-icon one me-3" style="width:40px; height:40px; font-size:1rem;">📄</div>
                            <div class="flex-grow-1">
                                <h6 class="fw-bold mb-0">${m.title}</h6>
                                <p class="text-muted small mb-0">${m.type} • ${m.date}</p>
                            </div>
                            <button class="btn btn-sm btn-link text-danger">Delete</button>
                        </div>
                    </div>
                `;
            });
        }

        document.getElementById('courseSelect').addEventListener('change', renderMaterials);
        
        document.getElementById('instructorUploadForm').addEventListener('submit', function(e) {
            e.preventDefault();
            materials.push({
                title: document.getElementById('materialTitle').value,
                type: document.getElementById('materialType').value,
                date: new Date().toISOString().split('T')[0],
                course: document.getElementById('courseSelect').value
            });
            renderMaterials();
            bootstrap.Modal.getInstance(document.getElementById('uploadMaterialModal')).hide();
            this.reset();
        });

        renderMaterials();
    </script>
</body>
</html>
