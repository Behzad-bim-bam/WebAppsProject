<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Edit Syllabus — CourseLink</title>
    <link rel="icon" href="Images/web-icon.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/home.css" rel="stylesheet">
    <link href="css/dashboard.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg app-navbar sticky-top bg-white">
        <div class="container-fluid px-4">
            <a class="navbar-brand d-flex align-items-center" href="Home.html">
                <img src="Images/web-logo.png" alt="CourseLink" width="38" height="34" class="me-2">
                <span class="fw-bold">CourseLink</span>
            </a>
            <div class="ms-auto d-flex align-items-center">
                <span class="me-3 text-muted d-none d-md-block">Welcome, Dr. Smith</span>
                <a href="Profile.html" class="user-avatar text-decoration-none">DS</a>
            </div>
        </div>
    </nav>

    <div class="app-container">
        <aside class="app-sidebar">
            <nav class="nav flex-column">
                <a class="nav-link" href="Home.html">Home</a>
                <a class="nav-link" href="InstructorDashboard.html">Dashboard</a>
                <a class="nav-link" href="InstructorCourses.html">Manage Courses</a>
                <a class="nav-link active" href="InstructorSyllabus.html">Edit Syllabus</a>
                <a class="nav-link" href="InstructorMaterials.html">Upload Materials</a>
                <a class="nav-link" href="InstructorCalendar.html">Exam Calendar</a>
            </nav>
        </aside>

        <main class="app-main">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="page-title mb-0">Edit Syllabus & Grading Scheme</h2>
                <div class="d-flex gap-2">
                    <button class="btn btn-outline-primary rounded-pill px-4" id="btn-preview">Preview as Student</button>
                    <button class="btn btn-primary rounded-pill px-4" id="btn-save">Save Changes</button>
                </div>
            </div>

            <div class="feature-card p-4 mb-4">
                <label class="form-label fw-bold">Select Course</label>
                <select class="form-select w-md-25" id="course-select">
                    <option value="CMP120">Intro to Programming (CMP120)</option>
                    <option value="MTH104">Calculus II (MTH104)</option>
                </select>
            </div>

            <!-- Syllabus Content -->
            <div class="row g-4">
                <div class="col-lg-8">
                    <div class="card p-4 mb-4">
                        <h5 class="fw-bold mb-3">Course Overview</h5>
                        <textarea class="form-control" rows="5" id="course-overview">This course provides fundamental knowledge and skills required for understanding the subject. Students will engage with lectures, assignments, and exams designed to evaluate their progress.</textarea>
                    </div>

                    <div class="card p-4 mb-4">
                        <h5 class="fw-bold mb-3">Assessment Breakdown</h5>
                        <div class="table-responsive">
                            <table class="table table-bordered align-middle" id="assessment-table">
                                <thead class="table-light text-center">
                                    <tr>
                                        <th>Assessment Title</th>
                                        <th>Weight (%)</th>
                                        <th>Action</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr>
                                        <td><input type="text" class="form-control" value="Quiz 1"></td>
                                        <td><input type="number" class="form-control text-center" value="10"></td>
                                        <td class="text-center"><button class="btn btn-sm btn-link text-danger remove-row">Remove</button></td>
                                    </tr>
                                    <tr>
                                        <td><input type="text" class="form-control" value="Midterm Exam"></td>
                                        <td><input type="number" class="form-control text-center" value="25"></td>
                                        <td class="text-center"><button class="btn btn-sm btn-link text-danger remove-row">Remove</button></td>
                                    </tr>
                                </tbody>
                                <tfoot>
                                    <tr>
                                        <td colspan="3">
                                            <button class="btn btn-sm btn-outline-primary" id="add-assessment">+ Add Assessment</button>
                                        </td>
                                    </tr>
                                </tfoot>
                            </table>
                        </div>
                    </div>
                </div>

                <div class="col-lg-4">
                    <div class="card p-4 mb-4 border-start border-accent border-4">
                        <h5 class="fw-bold mb-3">Grading Scheme</h5>
                        <p class="small text-muted mb-3">Define the percentage range for each grade.</p>
                        <div id="grading-scheme-editor">
                            <div class="row g-2 mb-2 align-items-center">
                                <div class="col-4 text-end small fw-bold">A</div>
                                <div class="col-8"><input type="text" class="form-control form-control-sm" value="95-100%"></div>
                            </div>
                            <div class="row g-2 mb-2 align-items-center">
                                <div class="col-4 text-end small fw-bold">A-</div>
                                <div class="col-8"><input type="text" class="form-control form-control-sm" value="90-94%"></div>
                            </div>
                            <div class="row g-2 mb-2 align-items-center">
                                <div class="col-4 text-end small fw-bold">B+</div>
                                <div class="col-8"><input type="text" class="form-control form-control-sm" value="85-89%"></div>
                            </div>
                            <div class="row g-2 mb-2 align-items-center">
                                <div class="col-4 text-end small fw-bold">B</div>
                                <div class="col-8"><input type="text" class="form-control form-control-sm" value="80-84%"></div>
                            </div>
                            <div class="row g-2 mb-2 align-items-center">
                                <div class="col-4 text-end small fw-bold">F</div>
                                <div class="col-8"><input type="text" class="form-control form-control-sm" value="< 60%"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('add-assessment').addEventListener('click', function() {
            const tbody = document.querySelector('#assessment-table tbody');
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td><input type="text" class="form-control" placeholder="New Assessment"></td>
                <td><input type="number" class="form-control text-center" placeholder="0"></td>
                <td class="text-center"><button class="btn btn-sm btn-link text-danger remove-row">Remove</button></td>
            `;
            tbody.appendChild(tr);
            attachRemoveEvents();
        });

        function attachRemoveEvents() {
            document.querySelectorAll('.remove-row').forEach(btn => {
                btn.onclick = function() {
                    this.closest('tr').remove();
                };
            });
        }

        document.getElementById('btn-save').onclick = function() {
            alert('Syllabus and Grading Scheme saved successfully!');
        };

        document.getElementById('btn-preview').onclick = function() {
            const course = document.getElementById('course-select').value;
            window.location.href = `CourseDetail.html?code=${course}`;
        };

        attachRemoveEvents();
    </script>
</body>
</html>
