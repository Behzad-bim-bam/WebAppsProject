<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile — CourseLink</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/home.css" rel="stylesheet">
    <link href="css/dashboard.css" rel="stylesheet">

    <style>
        
    </style>

</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg app-navbar sticky-top bg-white">
        <div class="container-fluid px-4">
            <a class="navbar-brand fw-bold" href="Home.html">CourseLink</a>
        </div>
    </nav>

    <div class="app-container">

        <!-- SIDEBAR -->
        <aside class="app-sidebar">
            <nav class="nav flex-column">
                <a class="nav-link" href="Home.html">Home</a>
                <a class="nav-link" href="StudentDashboard.html">Dashboard</a>
                <a class="nav-link" href="MyCourses.html">My Courses</a>
                <a class="nav-link" href="Materials.html">Materials</a>
                <a class="nav-link" href="Evaluate.html">Grade Tracker</a>
                <a class="nav-link" href="Calendar.html">Calendar</a>
                <a class="nav-link active" href="Profile.html">Profile</a>
            </nav>
        </aside>

        <!-- MAIN -->
        <main class="app-main p-4">

            <h2 class="mb-4">My Profile</h2>

            <!-- PERSONAL INFO -->
            <div class="card profile-card p-4 mb-4">
                <h5 class="mb-3">Personal Information</h5>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label>Name</label>
                        <input type="text" class="form-control" value="Behzad Davari">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label>Email</label>
                        <input type="email" class="form-control" value="behzad@example.com">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label>Major</label>
                        <input type="text" class="form-control" value="Computer Science">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label>Year</label>
                        <input type="text" class="form-control" value="2nd Year">
                    </div>
                </div>

                <button class="btn btn-primary mt-2">Save Changes</button>
            </div>

            <!-- ENROLLED COURSES -->
            <div class="card profile-card p-4 mb-4">
                <h5 class="mb-3">Enrolled Courses</h5>

                <ul class="list-group">
                    <li class="list-group-item">Intro to Programming</li>
                    <li class="list-group-item">Calculus II</li>
                </ul>
            </div>

            <!-- CHANGE PASSWORD -->
            <div class="card profile-card p-4">
                <h5 class="mb-3">Change Password</h5>

                <div class="mb-3">
                    <label>Current Password</label>
                    <input type="password" class="form-control">
                </div>

                <div class="mb-3">
                    <label>New Password</label>
                    <input type="password" class="form-control">
                </div>

                <div class="mb-3">
                    <label>Confirm New Password</label>
                    <input type="password" class="form-control">
                </div>

                <button class="btn btn-danger">Update Password</button>
            </div>

        </main>

    </div>
</body>

</html>
