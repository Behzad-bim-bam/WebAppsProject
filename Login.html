<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login — CourseLink</title>
    <link rel="icon" href="Images/web-icon.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <link href="css/common.css" rel="stylesheet">
    <link href="css/login.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar app-navbar py-2">
        <div class="container-fluid">
            <a class="navbar-brand d-flex align-items-center" href="Home.html">
                <img src="Images/web-logo.png" alt="CourseLink" width="40" height="35" class="me-2 rounded">
                CourseLink
            </a>
            <a href="Home.html" class="nav-link">Home</a>
        </div>
    </nav>

    <div class="auth-page">
        <div class="auth-card">
            <div class="card p-4">
                <h1 class="h4 fw-bold text-center mb-1">Login</h1>
                <p class="text-center text-muted-cl small mb-4">Use your university email</p>
                <form id="loginForm" action="#" method="post">
                    <div class="mb-3">
                        <label for="email" class="form-label">University email</label>
                        <input type="email" class="form-control" id="email" name="email" placeholder="name@university.edu" required>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" class="form-control" id="password" name="password" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label">I am a</label>
                        <div class="role-options d-flex gap-4">
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="role" id="roleStudent" value="student" checked>
                                <label class="form-check-label" for="roleStudent">Student</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="role" id="roleInstructor" value="instructor">
                                <label class="form-check-label" for="roleInstructor">Instructor</label>
                            </div>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 btn-submit">Login</button>
                </form>
                <p class="text-center mt-3 mb-0 small text-muted-cl">
                    Don't have an account? <a href="SignUp.html" class="fw-semibold">Sign Up</a>
                </p>
            </div>
        </div>
    </div>
    <script src="js/login.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
</body>
</html>
